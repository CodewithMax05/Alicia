<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Alicia Online</title>
    <link rel="stylesheet" href="css/selection.css">
</head>
<body>
    <div id="selectionScreen">

        <!-- Header -->
        <header class="sel-header">
            <h1>🏇 Alicia Online</h1>
            <p>Multiplayer Pferderennen</p>
        </header>

        <!-- Zwei Spalten -->
        <div class="sel-main">

            <!-- Links: Pferd wählen -->
            <div class="sel-panel">
                <div class="panel-title">Pferd wählen</div>
                <div class="horse-grid">

                    <button type="button" class="horse-card" onclick="selectHorse('blitz', this)">
                        <div class="horse-icon" style="background:rgba(200,134,10,0.20)">🐴</div>
                        <h3>⚡ Blitz</h3>
                        <div class="stat-row"><span class="stat-label">Speed</span><div class="stat-track"><div class="stat-fill" style="width:85%;background:#ffd700"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Ausdauer</span><div class="stat-track"><div class="stat-fill" style="width:66%;background:#4caf50"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Beschl.</span><div class="stat-track"><div class="stat-fill" style="width:61%;background:#2196f3"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Sprung</span><div class="stat-track"><div class="stat-fill" style="width:83%;background:#9c27b0"></div></div></div>
                    </button>

                    <button type="button" class="horse-card" onclick="selectHorse('sturm', this)">
                        <div class="horse-icon" style="background:rgba(90,106,122,0.20)">🐴</div>
                        <h3>🌪️ Sturm</h3>
                        <div class="stat-row"><span class="stat-label">Speed</span><div class="stat-track"><div class="stat-fill" style="width:80%;background:#ffd700"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Ausdauer</span><div class="stat-track"><div class="stat-fill" style="width:60%;background:#4caf50"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Beschl.</span><div class="stat-track"><div class="stat-fill" style="width:100%;background:#2196f3"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Sprung</span><div class="stat-track"><div class="stat-fill" style="width:83%;background:#9c27b0"></div></div></div>
                    </button>

                    <button type="button" class="horse-card" onclick="selectHorse('nebel', this)">
                        <div class="horse-icon" style="background:rgba(106,170,212,0.20)">🐴</div>
                        <h3>🌫️ Nebel</h3>
                        <div class="stat-row"><span class="stat-label">Speed</span><div class="stat-track"><div class="stat-fill" style="width:75%;background:#ffd700"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Ausdauer</span><div class="stat-track"><div class="stat-fill" style="width:100%;background:#4caf50"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Beschl.</span><div class="stat-track"><div class="stat-fill" style="width:50%;background:#2196f3"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Sprung</span><div class="stat-track"><div class="stat-fill" style="width:100%;background:#9c27b0"></div></div></div>
                    </button>

                    <button type="button" class="horse-card" onclick="selectHorse('feuer', this)">
                        <div class="horse-icon" style="background:rgba(204,34,0,0.20)">🐴</div>
                        <h3>🔥 Feuer</h3>
                        <div class="stat-row"><span class="stat-label">Speed</span><div class="stat-track"><div class="stat-fill" style="width:100%;background:#ffd700"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Ausdauer</span><div class="stat-track"><div class="stat-fill" style="width:60%;background:#4caf50"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Beschl.</span><div class="stat-track"><div class="stat-fill" style="width:47%;background:#2196f3"></div></div></div>
                        <div class="stat-row"><span class="stat-label">Sprung</span><div class="stat-track"><div class="stat-fill" style="width:75%;background:#9c27b0"></div></div></div>
                    </button>

                </div>
            </div>

            <!-- Rechts: Fahrer & Start -->
            <div class="sel-panel sel-right">
                <div class="panel-title">Dein Fahrer</div>

                <!-- Charakter -->
                <div class="char-section">
                    <div class="char-row">
                        <span class="char-label">Kopf</span>
                        <div class="char-opts" id="helmetOpts">
                            <button class="char-sw char-hat selected" onclick="selectRider('helmet',0,this)" title="Cap">🧢</button>
                            <button class="char-sw char-hat" onclick="selectRider('helmet',1,this)" title="Cowboyhut">🤠</button>
                            <button class="char-sw char-hat" onclick="selectRider('helmet',2,this)" title="Zylinder">🎩</button>
                            <button class="char-sw char-hat" onclick="selectRider('helmet',3,this)" title="Keine">🧑</button>
                        </div>
                    </div>
                    <div class="char-row">
                        <span class="char-label">Hautfarbe</span>
                        <div class="char-opts" id="faceOpts">
                            <button class="char-sw selected" style="background:#fce8cc" onclick="selectRider('face',0,this)" title="Sehr hell"></button>
                            <button class="char-sw" style="background:#f0c89e" onclick="selectRider('face',1,this)" title="Hell"></button>
                            <button class="char-sw" style="background:#e8b48a" onclick="selectRider('face',2,this)" title="Mittel-hell"></button>
                            <button class="char-sw" style="background:#d19a6a" onclick="selectRider('face',3,this)" title="Mittel"></button>
                            <button class="char-sw" style="background:#bf8050" onclick="selectRider('face',4,this)" title="Gebräunt"></button>
                            <button class="char-sw" style="background:#ab7848" onclick="selectRider('face',5,this)" title="Mittel-dunkel"></button>
                            <button class="char-sw" style="background:#8b6040" onclick="selectRider('face',6,this)" title="Dunkel"></button>
                            <button class="char-sw" style="background:#5c3818" onclick="selectRider('face',7,this)" title="Sehr dunkel"></button>
                        </div>
                    </div>
                    <div class="char-row">
                        <span class="char-label">Oberteil</span>
                        <div class="char-opts" id="shirtOpts">
                            <button class="char-sw selected" style="background:#d92525" onclick="selectRider('shirt',0,this)"></button>
                            <button class="char-sw" style="background:#3373d9" onclick="selectRider('shirt',1,this)"></button>
                            <button class="char-sw" style="background:#25b840" onclick="selectRider('shirt',2,this)"></button>
                            <button class="char-sw" style="background:#f2d018" onclick="selectRider('shirt',3,this)"></button>
                            <button class="char-sw" style="background:#a62ed9" onclick="selectRider('shirt',4,this)"></button>
                            <button class="char-sw" style="background:#eaeaea" onclick="selectRider('shirt',5,this)"></button>
                            <button class="char-sw" style="background:#e87820" onclick="selectRider('shirt',6,this)"></button>
                            <button class="char-sw" style="background:#15c8c8" onclick="selectRider('shirt',7,this)"></button>
                            <button class="char-sw" style="background:#e82888" onclick="selectRider('shirt',8,this)"></button>
                            <button class="char-sw" style="background:#333333" onclick="selectRider('shirt',9,this)"></button>
                        </div>
                    </div>
                    <div class="char-row">
                        <span class="char-label">Hose</span>
                        <div class="char-opts" id="pantsOpts">
                            <button class="char-sw selected" style="background:#222228" onclick="selectRider('pants',0,this)"></button>
                            <button class="char-sw" style="background:#263d80" onclick="selectRider('pants',1,this)"></button>
                            <button class="char-sw" style="background:#6b472e" onclick="selectRider('pants',2,this)"></button>
                            <button class="char-sw" style="background:#8c8c94" onclick="selectRider('pants',3,this)"></button>
                            <button class="char-sw" style="background:#3d6e2a" onclick="selectRider('pants',4,this)"></button>
                            <button class="char-sw" style="background:#800020" onclick="selectRider('pants',5,this)"></button>
                        </div>
                    </div>
                </div>

                <!-- Start -->
                <button type="button" id="startBtn" disabled onclick="beginRace()">Pferd wählen…</button>
            </div>

        </div>


    </div>

    <script>
        // ── Auswahl-Logik ────────────────────────────────────────────────────────
        let _selectedHorseType = null;
        let _riderConfig = { helmet: 0, face: 0, shirt: 0, pants: 0 };

        function selectRider(part, index, el) {
            _riderConfig[part] = index;
            const groupId = { helmet: 'helmetOpts', face: 'faceOpts', shirt: 'shirtOpts', pants: 'pantsOpts' }[part];
            document.querySelectorAll('#' + groupId + ' .char-sw').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function selectHorse(type, el) {
            document.querySelectorAll('.horse-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            _selectedHorseType = type;
            const btn = document.getElementById('startBtn');
            btn.disabled    = false;
            btn.textContent = '🏇 Zum Rennen!';
        }

        function beginRace() {
            if (!_selectedHorseType) return;
            sessionStorage.setItem('alicia_selection', JSON.stringify({
                horseType:   _selectedHorseType,
                playerName:  '',
                riderConfig: { ..._riderConfig },
            }));
            window.location.href = 'game.html';
        }

        // ── Letzte Auswahl wiederherstellen ─────────────────────────────────
        function restoreLastSelection() {
            const raw = sessionStorage.getItem('alicia_selection');
            if (!raw) return;
            let sel;
            try { sel = JSON.parse(raw); } catch { return; }
            if (sel.horseType) {
                const card = document.querySelector(`.horse-card[onclick*="'${sel.horseType}'"]`);
                if (card) selectHorse(sel.horseType, card);
            }
            if (sel.riderConfig) {
                const parts = { helmet: 'helmetOpts', face: 'faceOpts', shirt: 'shirtOpts', pants: 'pantsOpts' };
                for (const [part, groupId] of Object.entries(parts)) {
                    const idx = sel.riderConfig[part];
                    if (idx == null) continue;
                    const btn = document.querySelectorAll('#' + groupId + ' .char-sw')[idx];
                    if (btn) selectRider(part, idx, btn);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            restoreLastSelection();
            // Kicked-Hinweis anzeigen wenn man aus einer Lobby geflogen ist
            if (sessionStorage.getItem('alicia_kicked')) {
                sessionStorage.removeItem('alicia_kicked');
                const banner = document.createElement('div');
                banner.textContent = '⚠️ Du wurdest vom Leader aus der Lobby entfernt.';
                banner.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(220,60,60,0.92);color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.4)';
                document.body.appendChild(banner);
                setTimeout(() => banner.remove(), 4000);
            }
        });
    </script>
</body>
</html>
